<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeevi | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
}

nav h2{
    color:#00f5ff;
}

nav ul{
    display:flex;
    gap:25px;
    list-style:none;
}

nav ul li a{
    text-decoration:none;
    color:white;
    transition:0.3s;
}

nav ul li a:hover{
    color:#00f5ff;
}

/* HERO SECTION */
.hero{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:80px 8%;
    min-height:90vh;
}

/* LEFT IMAGE */
.hero-img{
    flex:1;
    display:flex;
    justify-content:center;
}

.hero-img img{
    width:280px;
    height:280px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid #00f5ff;
    box-shadow:0 0 40px #00f5ff;
}

/* RIGHT CONTENT */
.hero-content{
    flex:1;
    padding-left:40px;
}

.hero-content h1{
    font-size:45px;
    margin-bottom:15px;
}

.hero-content span{
    color:#00f5ff;
}

.hero-content h3{
    font-weight:400;
    margin-bottom:20px;
    opacity:0.8;
}

.hero-content p{
    max-width:500px;
    line-height:1.6;
    opacity:0.85;
}

/* BUTTONS */
.buttons{
    margin-top:25px;
}

.btn{
    padding:12px 28px;
    margin-right:15px;
    border:none;
    border-radius:30px;
    background:#00f5ff;
    color:#000;
    font-weight:600;
    cursor:pointer;
    transition:0.4s;
}

.btn:hover{
    background:transparent;
    color:#00f5ff;
    border:2px solid #00f5ff;
    box-shadow:0 0 20px #00f5ff;
}

/* RESPONSIVE */
@media(max-width:900px){
    .hero{
        flex-direction:column;
        text-align:center;
    }

    .hero-content{
        padding-left:0;
        margin-top:30px;
    }
}
</style>
</head>

<body>

<nav>
    <h2>Jeevi.dev</h2>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Skills</a></li>
        <li><a href="#">Projects</a></li>
    </ul>
</nav>

<section class="hero">

    <!-- LEFT SIDE IMAGE -->
    <div class="hero-img">
        <img src="/Photo.jpeg" alt="Jeevi Photo">
    </div>

    <!-- RIGHT SIDE CONTENT -->
    <div class="hero-content">
        <h1>Hello, I'm <span>Jeevi</span></h1>
        <h3>Java Developer | React Learner | IT Student</h3>
        <p>
            I am passionate about Data Structures and Web Development.
            I love building modern full-stack applications and solving real-world problems.
        </p>

        <div class="buttons">
            <button class="btn">View Projects</button>
            <button class="btn">Contact Me</button>
        </div>
    </div>

</section>

</body>
</html>
